<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 - 宣纸质感 -->
  <rect width="400" height="200" fill="#f5f0e6"/>

  <!-- 传统中式风格 -->
  <text x="200" y="45" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#8b4513">传统中式风格 · 方案C</text>

  <!-- LOGO主体 - 中式建筑意象 -->
  <g transform="translate(160, 70)">
    <!-- 中式屋檐图形 -->
    <path d="M0,30 L40,0 L80,30" fill="none" stroke="#8b4513" stroke-width="4" stroke-linecap="round"/>
    <path d="M10,30 L40,8 L70,30" fill="none" stroke="#8b4513" stroke-width="2"/>

    <!-- 建筑主体 - 方形 -->
    <rect x="20" y="35" width="40" height="45" fill="none" stroke="#8b4513" stroke-width="3"/>
    <line x1="20" y1="45" x2="60" y2="45" stroke="#8b4513" stroke-width="2"/>
    <line x1="20" y1="57" x2="60" y2="57" stroke="#8b4513" stroke-width="2"/>

    <!-- 底部基座 -->
    <line x1="10" y1="85" x2="70" y2="85" stroke="#8b4513" stroke-width="3"/>
    <rect x="15" y="90" width="50" height="8" fill="#8b4513"/>

    <!-- 点缀 - 圆形印章感 -->
    <circle cx="70" cy="35" r="8" fill="none" stroke="#c9a962" stroke-width="2"/>
  </g>

  <!-- 公司名称 -->
  <text x="200" y="150" text-anchor="middle" font-family="SimSun, serif" font-size="18" fill="#1a1a1a">广东揽世建筑工程有限公司</text>

  <!-- 印章元素 -->
  <g transform="translate(300, 155)">
    <rect x="0" y="0" width="30" height="30" fill="#c9a962"/>
    <text x="15" y="22" text-anchor="middle" font-family="SimSun, serif" font-size="12" fill="#1a1a1a">揽世</text>
  </g>
</svg>
