<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 - 深蓝专业色 -->
  <rect width="400" height="200" fill="#0d1b2a"/>

  <!-- 现代简约风格 -->
  <text x="200" y="40" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#4cc9f0">现代简约风格 · 方案B</text>

  <!-- LOGO主体 - 极简L建筑线条 -->
  <g transform="translate(160, 55)">
    <!-- 主体L线条 - 硬朗 -->
    <polyline points="0,80 0,0 60,0" fill="none" stroke="#4cc9f0" stroke-width="5" stroke-linecap="square"/>

    <!-- 内部建筑结构线 -->
    <line x1="15" y1="0" x2="15" y2="50" stroke="#4cc9f0" stroke-width="2"/>
    <line x1="30" y1="0" x2="30" y2="35" stroke="#4cc9f0" stroke-width="2"/>
    <line x1="45" y1="0" x2="45" y2="20" stroke="#4cc9f0" stroke-width="2"/>

    <!-- 底部横线 -->
    <line x1="0" y1="80" x2="70" y2="80" stroke="#4cc9f0" stroke-width="2"/>
  </g>

  <!-- 公司名称 -->
  <text x="200" y="145" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="300" fill="#ffffff">广东揽世建筑工程有限公司</text>

  <!-- 英文 -->
  <text x="200" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" letter-spacing="4" fill="#4cc9f0">LANSHI</text>

  <!-- 极简点缀 -->
  <circle cx="320" cy="55" r="3" fill="#4cc9f0"/>
  <circle cx="332" cy="45" r="2" fill="#4cc9f0" opacity="0.5"/>
  <circle cx="340" cy="38" r="1.5" fill="#4cc9f0" opacity="0.3"/>
</svg>
