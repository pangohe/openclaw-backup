<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#f8fafc"/>
  <!-- 极简线条阵列 -->
  <g transform="translate(30, 20)">
    <!-- 平行向上线条 -->
    <line x1="20" y1="160" x2="60" y2="20" stroke="url(#grad3)" stroke-width="12" stroke-linecap="square"/>
    <line x1="50" y1="160" x2="90" y2="20" stroke="url(#grad3)" stroke-width="12" stroke-linecap="square"/>
    <line x1="80" y1="160" x2="120" y2="20" stroke="url(#grad3)" stroke-width="12" stroke-linecap="square"/>
    <!-- 底部水平线（建筑基座） -->
    <line x1="10" y1="160" x2="130" y2="160" stroke="url(#grad3)" stroke-width="8"/>
    <!-- 右侧垂直切边 -->
    <line x1="140" y1="10" x2="140" y2="170" stroke="#e67e22" stroke-width="6"/>
  </g>
</svg>